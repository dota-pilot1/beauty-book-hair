server:
  port: 4101

spring:
  application:
    name: pilot-callcenter-server

  datasource:
    url: jdbc:postgresql://localhost:5434/pilot_callcenter
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true

jwt:
  secret: ${JWT_SECRET:pilot-callcenter-dev-secret-key-must-be-at-least-32-bytes-long}
  access-token-expiration-ms: 1800000
  refresh-token-expiration-ms: 604800000
  issuer: pilot-callcenter
