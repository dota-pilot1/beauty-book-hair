server:
  port: 4101

spring:
  application:
    name: beauty-book-server

  datasource:
    url: jdbc:postgresql://localhost:5434/beauty_book
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.connectiontimeout: 5000
      mail.smtp.timeout: 5000
      mail.smtp.writetimeout: 5000

cors:
  allowed-origin: ${ALLOWED_ORIGIN:https://dxline-tallent.com,http://localhost:3000,http://localhost:4100}

jwt:
  secret: ${JWT_SECRET:beauty-book-dev-secret-key-must-be-at-least-32-bytes-long}
  access-token-expiration-ms: 1800000
  refresh-token-expiration-ms: 604800000
  issuer: beauty-book

app:
  front-url: ${FRONT_URL:https://dxline-tallent.com}

aws:
  s3:
    access-key: ${AWS_ACCESS_KEY_ID:}
    secret-key: ${AWS_SECRET_ACCESS_KEY:}
    bucket: ${AWS_S3_BUCKET_NAME:}
    region: ${AWS_S3_REGION:ap-northeast-2}
    prefix: ${AWS_S3_PREFIX:beauty-book}
    presign-expires-seconds: 300

logging:
  level:
    org.apache.tomcat: OFF
    org.apache.catalina: OFF
    org.apache.coyote: OFF

---
spring:
  config:
    activate:
      on-profile: "!prod"
    import: optional:classpath:application-local.yaml
